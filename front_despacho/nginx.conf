server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto redirige las rutas de React al index.html para evitar errores 404 al recargar
        try_files $uri $uri/ /index.html;
    }

    # PROXY REVERSO: Aquí es donde el Front se conecta con el Back privado de forma segura
    location /api/despachos/ {
        proxy_pass http://10.0.141.91:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ventas/ {
        proxy_pass http://10.0.141.91:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}