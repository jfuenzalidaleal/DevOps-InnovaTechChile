server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto redirige las rutas de React al index.html para evitar errores 404 al recargar
        try_files $uri $uri/ /index.html;
    }


    # PROXY REVERSO: Mapeo exacto para el microservicio de Despachos (Puerto 8081)
        location /api/v1/despachos {
            proxy_pass http://10.0.141.91:8081/api/v1/despachos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        }

        # PROXY REVERSO: Mapeo exacto para el microservicio de Ventas (Puerto 8082)
        location /api/v1/ventas {
            proxy_pass http://10.0.141.91:8082/api/v1/ventas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        }
}