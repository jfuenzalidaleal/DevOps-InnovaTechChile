server {
    listen 80;
    server_name localhost;

    # 1. Frontend: Archivos estáticos de React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy Reverso: Microservicio Despachos
    location /api/v1/despachos {
        proxy_pass http://10.0.141.91:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy Reverso: Microservicio Ventasss
    location /api/v1/ventas {
        proxy_pass http://10.0.141.91:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}